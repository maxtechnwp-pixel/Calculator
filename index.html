<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIR Tax Calculator</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 600px; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; }
        
        h2 { text-align: center; color: #1a73e8; margin-bottom: 5px; font-size: 1.4rem; }
        .sub-title { text-align: center; color: #666; margin-bottom: 15px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }

        .mode-switch { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 10px; }
        .mode-btn { padding: 10px 2px; cursor: pointer; border: none; background: none; font-weight: bold; border-radius: 7px; font-size: 0.7rem; transition: 0.3s; }
        .mode-btn.active { background: #1a73e8; color: white; }

        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; }

        .res-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 1rem; }
        .minus { color: #d93025; font-weight: bold; }
        .hidden { display: none; }
        .total-row { border-top: 2px solid #333; margin-top: 10px; font-weight: bold; font-size: 1.3rem; color: #1e8e3e; background: #eef7ee; padding: 15px; border-radius: 5px; }
        .info-text { font-size: 0.8rem; color: #777; font-style: italic; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<h1 style="color: #333; margin-bottom: 20px;">BIR Tax Calculator</h1>

<div class="container">
    
    <div class="box">
        <h2>Tax Computation</h2>
        <p class="sub-title">Direct Amount Calculation</p>

        <div class="mode-switch">
            <button id="btn-1" class="mode-btn active" onclick="setMode('1-ONLY')">1% ONLY</button>
            <button id="btn-Non" class="mode-btn" onclick="setMode('NON-VAT')">NON-VAT (1+3%)</button>
            <button id="btn-Vat" class="mode-btn" onclick="setMode('VAT')">VAT (1+5%)</button>
        </div>

        <label>Input Gross Amount:</label>
        <input type="number" id="inputAmount" placeholder="0.00" oninput="calculate()">

        <div class="res-row">
            <span>Gross Amount:</span>
            <span id="outGross">₱0.00</span>
        </div>
        
        <div class="res-row minus" id="row1">
            <span id="lab1">Less: 1% EWT:</span>
            <span id="tax1">-₱0.00</span>
        </div>
        <div class="res-row minus" id="row2">
            <span id="lab2">Less: Tax:</span>
            <span id="tax2">-₱0.00</span>
        </div>

        <div class="res-row total-row">
            <span>NET PAYABLE:</span>
            <span id="outNet">₱0.00</span>
        </div>
        <p class="info-text" id="infoText">* Bawas 1% sa Gross Amount</p>
    </div>

</div>

<script>
    let currentMode = '1-ONLY';

    function setMode(m) {
        currentMode = m;
        updateUI(m);
        calculate();
    }

    function updateUI(m) {
        const btn1 = document.getElementById('btn-1');
        const btnNon = document.getElementById('btn-Non');
        const btnVat = document.getElementById('btn-Vat');
        const row2 = document.getElementById('row2');
        const lab2 = document.getElementById('lab2');
        const info = document.getElementById('infoText');

        btn1.className = (m === '1-ONLY') ? 'mode-btn active' : 'mode-btn';
        btnNon.className = (m === 'NON-VAT') ? 'mode-btn active' : 'mode-btn';
        btnVat.className = (m === 'VAT') ? 'mode-btn active' : 'mode-btn';

        if (m === '1-ONLY') {
            row2.classList.add('hidden');
            info.innerText = "* Bawas 1% sa Gross Amount";
        } else if (m === 'NON-VAT') {
            row2.classList.remove('hidden');
            lab2.innerText = "Less: 3% Percentage Tax:";
            info.innerText = "* Bawas 1% + 3% sa Gross Amount";
        } else {
            row2.classList.remove('hidden');
            lab2.innerText = "Less: 5% Final VAT:";
            info.innerText = "* Bawas 1% + 5% based sa Net of 12% VAT";
        }
    }

    function calculate() {
        const amount = parseFloat(document.getElementById('inputAmount').value) || 0;
        let t1 = 0, t2 = 0;

        if (currentMode === 'VAT') {
            let netOfVat = amount / 1.12;
            t1 = netOfVat * 0.01;
            t2 = netOfVat * 0.05;
        } else if (currentMode === 'NON-VAT') {
            t1 = amount * 0.01;
            t2 = amount * 0.03;
        } else {
            t1 = amount * 0.01;
        }

        document.getElementById('outGross').innerText = formatPera(amount);
        document.getElementById('tax1').innerText = "-" + formatPera(t1);
        document.getElementById('tax2').innerText = "-" + formatPera(t2);
        document.getElementById('outNet').innerText = formatPera(amount - t1 - t2);
    }

    function formatPera(num) {
        return "₱" + num.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    // Initial setup
    updateUI('1-ONLY');
</script>

</body>
</html>
